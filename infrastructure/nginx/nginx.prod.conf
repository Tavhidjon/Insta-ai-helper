worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Rate limiting
    limit_req_zone \ zone=api:10m rate=30r/m;
    limit_req_zone \ zone=webhook:10m rate=100r/m;

    # Redirect HTTP ? HTTPS
    server {
        listen 80;
        server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://\System.Management.Automation.Internal.Host.InternalHost\;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection '1; mode=block';
        add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains';

        # Django static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control 'public, immutable';
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # WebSocket (Django Channels)
        location /ws/ {
            proxy_pass         http://asgi:8001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade \;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host \System.Management.Automation.Internal.Host.InternalHost;
            proxy_cache_bypass \;
            proxy_read_timeout 86400;
        }

        # Instagram webhook (higher rate limit)
        location /api/instagram/webhook/ {
            limit_req zone=webhook burst=50 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host \System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header   X-Real-IP \;
            proxy_set_header   X-Forwarded-For \;
            proxy_set_header   X-Forwarded-Proto \;
        }

        # Django REST API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host \System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header   X-Real-IP \;
            proxy_set_header   X-Forwarded-For \;
            proxy_set_header   X-Forwarded-Proto \;
            proxy_read_timeout 120;
        }

        # Django admin
        location /admin/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host \System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header   X-Real-IP \;
            proxy_set_header   X-Forwarded-For \;
            proxy_set_header   X-Forwarded-Proto \;
        }

        # Next.js frontend (everything else)
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host \System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header   X-Real-IP \;
            proxy_set_header   X-Forwarded-For \;
            proxy_set_header   X-Forwarded-Proto \;
        }
    }
}
