version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: carrent_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: \
      POSTGRES_USER: \
      POSTGRES_PASSWORD: \
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U \ -d \']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carrent_redis
    restart: always
    command: redis-server --appendonly yes --requirepass \
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: carrent_backend
    restart: always
    command: >
      sh -c 'python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 120
               --access-logfile -'
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  asgi:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: carrent_asgi
    restart: always
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - media_data:/app/media
    env_file: .env.prod
    depends_on:
      - backend

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: carrent_celery
    restart: always
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    volumes:
      - media_data:/app/media
    env_file: .env.prod
    depends_on:
      - backend
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: carrent_beat
    restart: always
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.prod
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: carrent_frontend
    restart: always
    env_file: .env.prod

  nginx:
    image: nginx:alpine
    container_name: carrent_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/certbot/conf:/etc/letsencrypt:ro
      - ./infrastructure/certbot/www:/var/www/certbot:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - backend
      - asgi
      - frontend

  certbot:
    image: certbot/certbot
    container_name: carrent_certbot
    volumes:
      - ./infrastructure/certbot/conf:/etc/letsencrypt
      - ./infrastructure/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait \$\; done;'"

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
